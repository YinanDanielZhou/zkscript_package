[package]
name = "zkSDO"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "MMRSUMsetup"
path = "src/sum/MMRSUMsetup.rs"

[[bin]]
name = "MMRCOMPsetup"
path = "src/compare/MMRCOMPsetup.rs"

[dependencies]
ark-ff = "0.4.2"
ark-groth16 = "0.4.0"
ark-mnt4-753 = "0.4.0"
ark-r1cs-std = "0.4.0"
ark-relations = "0.4.0"
ark-serialize = "0.4.2"
ark-snark = "0.4.0"
ark-test-curves = { version = "0.4.2", features = ["bls12_381_curve"] }
rand = "0.8.5"
rand_chacha = "0.3.1"
serde_json = "1.0.128"

ark-std = "0.4"
ark-bls12-381 = "0.4"
ark-crypto-primitives = { version = "0.4", default-features = false, features = ["r1cs", "crh"] }

hex = "0.4"
sha2 = "0.10"
